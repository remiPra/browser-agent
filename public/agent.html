<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantom Agent — AI Browser Automation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0a0f;
      --bg-surface: #12121a;
      --bg-elevated: #1a1a26;
      --bg-hover: #222233;
      --border: #2a2a3d;
      --border-bright: #3d3d5c;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-dim: #5c5c78;
      --accent: #6c5ce7;
      --accent-bright: #a29bfe;
      --accent-glow: rgba(108, 92, 231, 0.25);
      --green: #00e676;
      --green-dim: rgba(0, 230, 118, 0.15);
      --red: #ff5252;
      --red-dim: rgba(255, 82, 82, 0.15);
      --orange: #ffab40;
      --orange-dim: rgba(255, 171, 64, 0.15);
      --cyan: #18ffff;
      --cyan-dim: rgba(24, 255, 255, 0.1);
      --blue: #448aff;
      --blue-dim: rgba(68, 138, 255, 0.15);
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    header {
      grid-column: 1 / -1;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-bright));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .status-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-badge.ready { background: var(--green-dim); color: var(--green); }
    .status-badge.running { background: var(--orange-dim); color: var(--orange); }
    .status-badge.error { background: var(--red-dim); color: var(--red); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-badge.running .status-dot { animation: pulse 1.5s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .mode-toggle {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-primary);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }

    .mode-toggle:hover { background: var(--bg-hover); border-color: var(--border-bright); }
    .mode-toggle.manual { background: var(--accent-glow); border-color: var(--accent); color: var(--accent-bright); }

    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 16px;
      transition: all 0.2s;
    }

    .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-bright); }

    .mode-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--accent-glow);
      color: var(--accent-bright);
    }

    .mode-badge.chrome { background: rgba(255, 171, 64, 0.15); color: #ffab40; }
    .mode-badge.extension { background: rgba(68, 138, 255, 0.15); color: #448aff; }

    .header-spacer { flex: 1; }

    .header-url {
      flex: 1; max-width: 500px;
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      height: 34px;
    }

    .header-url input {
      flex: 1; background: none; border: none;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; outline: none;
    }

    .header-url .url-icon { color: var(--text-dim); font-size: 14px; }

    .sidebar {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
      max-width: 100%;
      word-wrap: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.agent { background: var(--bg-elevated); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.system { background: var(--cyan-dim); border: 1px solid rgba(24, 255, 255, 0.15); color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 12px; }
    .msg.error { background: var(--red-dim); border: 1px solid rgba(255, 82, 82, 0.2); color: var(--red); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .msg.success { background: var(--green-dim); border: 1px solid rgba(0, 230, 118, 0.2); color: var(--green); }
    .msg.phase { color: var(--text-secondary); font-size: 12px; padding: 4px 12px; font-family: 'JetBrains Mono', monospace; }

    .msg .decision-action {
      display: inline-block;
      background: var(--accent-glow);
      color: var(--accent-bright);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
    }

    .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg-surface); }
    .chat-input-row { display: flex; gap: 8px; }

    .chat-input-row input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .chat-input-row input::placeholder { color: var(--text-dim); }

    .btn {
      padding: 10px 18px; border: none; border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }

    .btn-primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255, 82, 82, 0.2); }
    .btn-danger:hover { background: rgba(255, 82, 82, 0.25); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .browser-view { background: var(--bg-deep); display: flex; flex-direction: column; overflow: hidden; }

    .browser-toolbar {
      display: flex; align-items: center; padding: 8px 16px; gap: 8px;
      background: var(--bg-surface); border-bottom: 1px solid var(--border);
    }

    .step-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-dim);
      padding: 4px 10px; background: var(--bg-elevated); border-radius: 6px;
    }

    .browser-viewport {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }

    .browser-viewport img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .empty-state { display: flex; flex-direction: column; align-items: center; gap: 16px; color: var(--text-dim); }
    .empty-state-icon { font-size: 48px; opacity: 0.3; }
    .empty-state p { font-size: 14px; max-width: 300px; text-align: center; line-height: 1.6; }

    .plan-panel { display: none; padding: 12px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; margin: 8px 16px; font-size: 12px; }
    .plan-panel.visible { display: block; }
    .plan-panel h3 { font-size: 12px; color: var(--accent-bright); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; }
    .plan-step { display: flex; gap: 8px; padding: 4px 0; color: var(--text-secondary); font-size: 12px; }
    .plan-step-num { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 600; min-width: 20px; }
    .plan-step.active { color: var(--text-primary); }
    .plan-step.done { color: var(--green); text-decoration: line-through; opacity: 0.6; }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 56px 1fr 300px; }
      .browser-view { order: 1; }
      .sidebar { order: 2; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <a href="/" class="back-btn" title="Retour">←</a>
      <div class="logo">
        <div class="logo-icon">👻</div>
        <span>Phantom Agent</span>
      </div>
      <div class="mode-badge" id="modeBadge">Chromium</div>
      <div class="status-badge ready" id="statusBadge">
        <div class="status-dot"></div>
        <span id="statusText">Prêt</span>
      </div>
      <button class="mode-toggle" id="modeToggle">🤖 Auto</button>
      <div class="header-spacer"></div>
      <div class="header-url">
        <span class="url-icon">🔗</span>
        <input type="text" id="urlBar" placeholder="URL actuelle..." readonly>
      </div>
      <button class="step-counter" id="saveSessionBtn" style="cursor: pointer;">💾 Session</button>
      <div class="step-counter" id="stepCounter">— / —</div>
    </header>

    <div class="sidebar">
      <div class="plan-panel" id="planPanel">
        <h3>📋 Plan d'exécution</h3>
        <div id="planSteps"></div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="msg system" id="welcomeMsg">
          🤖 Phantom Agent initialisé.<br>
          Donnez-moi une tâche à accomplir dans le navigateur !
        </div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <input type="text" id="taskInput" placeholder="Décris la tâche à accomplir..." autofocus>
          <button class="btn btn-primary" id="sendBtn">▶ Go</button>
          <button class="btn btn-danger" id="stopBtn" style="display:none;">⛔ Stop</button>
        </div>
      </div>
    </div>

    <div class="browser-view">
      <div class="browser-viewport" id="viewport">
        <div class="empty-state">
          <div class="empty-state-icon">👻</div>
          <p>En attente d'une tâche...<br>Le navigateur s'affichera ici en temps réel.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Mode detection ──
    const urlParams = new URLSearchParams(window.location.search);
    const agentMode = urlParams.get('mode') || 'builtin';

    (function initModeBadge() {
      const badge = document.getElementById('modeBadge');
      if (agentMode === 'chrome') {
        badge.textContent = 'Chrome CDP';
        badge.classList.add('chrome');
        document.title = 'Phantom Agent — Chrome CDP';
      } else if (agentMode === 'extension') {
        badge.textContent = '🧩 Extension';
        badge.classList.add('extension');
        document.title = 'Phantom Agent — Extension Chrome';
      } else {
        badge.textContent = 'Chromium';
        document.title = 'Phantom Agent — Chromium';
      }
    })();

    // ── WebSocket ──
    let ws = null;
    let isRunning = false;
    let isManualMode = false;
    let screenshotInterval = null;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(protocol + '//' + location.host);

      ws.onopen = () => {
        console.log('✅ WebSocket connecté');
        ws.send(JSON.stringify({ type: 'init', mode: agentMode }));
        setStatus('ready', 'Connexion...');
      };

      ws.onclose = () => {
        console.log('❌ Déconnecté, reconnexion...');
        setStatus('error', 'Déconnecté');
        setTimeout(connect, 2000);
      };

      ws.onerror = () => setStatus('error', 'Erreur connexion');

      ws.onmessage = (event) => {
        const { type, data } = JSON.parse(event.data);
        handleEvent(type, data);
      };
    }

    function handleEvent(type, data) {
      switch (type) {
        case 'status':
          setStatus(data.status, data.message);
          // En mode extension, démarrer l'auto-screenshot dès que prêt
          if (agentMode === 'extension' && data.status === 'ready' && data.message.includes('Extension')) {
            addMessage('system', '🧩 Extension Chrome connectée !<br>Le live screenshot est actif. Donnez une tâche à l\'agent.');
            startScreenshotRefresh();
          }
          break;
        case 'phase':
          addMessage('phase', data.message);
          break;
        case 'plan':
          showPlan(data.plan);
          break;
        case 'step':
          document.getElementById('stepCounter').textContent = data.step + ' / ' + data.maxSteps;
          break;
        case 'screenshot':
          updateScreenshot(data);
          break;
        case 'decision':
          showDecision(data.decision);
          break;
        case 'action_result':
          break;
        case 'complete':
          addMessage('success', '✅ Tâche terminée ! ' + data.result);
          setStatus('ready', 'Terminé');
          setRunning(false);
          // Reprendre le screenshot auto en mode extension
          if (agentMode === 'extension') startScreenshotRefresh();
          break;
        case 'error':
          addMessage('error', '❌ ' + data.message);
          setStatus('error', 'Erreur');
          setRunning(false);
          if (agentMode === 'extension') startScreenshotRefresh();
          break;
        case 'stopped':
          addMessage('system', '⛔ Tâche arrêtée');
          setStatus('ready', 'Arrêté');
          setRunning(false);
          if (agentMode === 'extension') startScreenshotRefresh();
          break;
        case 'session_saved':
          if (data.success) addMessage('success', '💾 Session sauvegardée !');
          else addMessage('error', '❌ Sauvegarde: ' + data.error);
          break;
      }
    }

    function setStatus(status, text) {
      const badge = document.getElementById('statusBadge');
      const label = document.getElementById('statusText');
      badge.className = 'status-badge ' + (
        ['executing', 'planning', 'observing', 'deciding'].includes(status) ? 'running' :
        status === 'shutdown' ? 'error' : status
      );
      label.textContent = text.replace(/^[^\w]*/, '').slice(0, 30);
    }

    function addMessage(type, text) {
      const container = document.getElementById('chatMessages');
      const msg = document.createElement('div');
      msg.className = 'msg ' + type;
      msg.innerHTML = text;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    function showPlan(plan) {
      const panel = document.getElementById('planPanel');
      const stepsDiv = document.getElementById('planSteps');
      panel.classList.add('visible');
      stepsDiv.innerHTML = '';
      if (plan.task_understanding) {
        const p = document.createElement('p');
        p.style.cssText = 'color: var(--text-secondary); margin-bottom: 8px; font-size: 12px;';
        p.textContent = plan.task_understanding;
        stepsDiv.appendChild(p);
      }
      for (const step of plan.steps || []) {
        const div = document.createElement('div');
        div.className = 'plan-step';
        div.innerHTML = '<span class="plan-step-num">' + step.step + '.</span><span>' + step.description + '</span>';
        stepsDiv.appendChild(div);
      }
    }

    function showDecision(decision) {
      if (decision.action === 'done' || decision.action === 'error') return;
      const label = '<span class="decision-action">' + decision.action.toUpperCase() + '</span>';
      addMessage('agent', label + ' ' + (decision.reason || ''));
    }

    function updateScreenshot(data) {
      const viewport = document.getElementById('viewport');
      viewport.innerHTML = '<img src="data:image/jpeg;base64,' + data.image + '" alt="Browser screenshot">';
      if (data.url) document.getElementById('urlBar').value = data.url;
    }

    function setRunning(running) {
      isRunning = running;
      document.getElementById('sendBtn').style.display = running ? 'none' : 'flex';
      document.getElementById('stopBtn').style.display = running ? 'flex' : 'none';
      document.getElementById('taskInput').disabled = running;
      // Stopper l'auto-refresh pendant que l'agent travaille (il envoie ses propres screenshots)
      if (running) stopScreenshotRefresh();
    }

    // ── Actions ──
    function sendTask() {
      const input = document.getElementById('taskInput');
      const task = input.value.trim();
      if (!task || !ws || ws.readyState !== 1) return;
      addMessage('user', task);
      ws.send(JSON.stringify({ type: 'task', task: task }));
      input.value = '';
      setRunning(true);
      setStatus('running', 'En cours...');
    }

    function stopTask() {
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'stop' }));
    }

    function saveSession() {
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'save_session' }));
    }

    // ── Screenshot auto-refresh (pour mode extension & mode manuel) ──
    function startScreenshotRefresh() {
      stopScreenshotRefresh();
      requestScreenshot();
      screenshotInterval = setInterval(requestScreenshot, 2000);
    }

    function stopScreenshotRefresh() {
      if (screenshotInterval) {
        clearInterval(screenshotInterval);
        screenshotInterval = null;
      }
    }

    function requestScreenshot() {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'screenshot_request' }));
      }
    }

    // ── Mode Manuel/Auto ──
    function toggleMode() {
      isManualMode = !isManualMode;
      const toggleBtn = document.getElementById('modeToggle');
      const urlBar = document.getElementById('urlBar');
      const taskInput = document.getElementById('taskInput');
      const sendBtn = document.getElementById('sendBtn');

      if (isManualMode) {
        toggleBtn.textContent = '🎮 Manuel';
        toggleBtn.classList.add('manual');
        urlBar.removeAttribute('readonly');
        urlBar.placeholder = 'Entrez une URL et appuyez sur Entrée...';
        taskInput.disabled = true;
        sendBtn.disabled = true;
        startScreenshotRefresh();
        addMessage('system', '🎮 Mode manuel activé.');
      } else {
        toggleBtn.textContent = '🤖 Auto';
        toggleBtn.classList.remove('manual');
        urlBar.setAttribute('readonly', 'readonly');
        urlBar.placeholder = 'URL actuelle...';
        if (!isRunning) { taskInput.disabled = false; sendBtn.disabled = false; }
        // En mode extension, garder le refresh ; sinon l'arrêter
        if (agentMode !== 'extension') stopScreenshotRefresh();
        addMessage('system', '🤖 Mode auto activé.');
      }
    }

    function navigateManual(url) {
      if (!url || !ws || ws.readyState !== 1) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
      ws.send(JSON.stringify({ type: 'navigate', url: url }));
    }

    // ── Events ──
    document.getElementById('taskInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTask(); }
    });

    document.getElementById('urlBar').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && isManualMode) {
        e.preventDefault();
        if (e.target.value.trim()) navigateManual(e.target.value.trim());
      }
    });

    document.getElementById('sendBtn').addEventListener('click', sendTask);
    document.getElementById('stopBtn').addEventListener('click', stopTask);
    document.getElementById('modeToggle').addEventListener('click', toggleMode);
    document.getElementById('saveSessionBtn').addEventListener('click', saveSession);

    // Masquer le bouton session en mode Chrome CDP / Extension
    if (agentMode === 'chrome' || agentMode === 'extension') {
      document.getElementById('saveSessionBtn').style.display = 'none';
    }

    // ── Init ──
    connect();
  </script>
</body>
</html>
