<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .title { font-size: 15px; font-weight: 600; }
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .status.connected { background: rgba(0,230,118,0.12); color: #00e676; }
    .status.disconnected { background: rgba(255,82,82,0.12); color: #ff5252; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-connect {
      background: linear-gradient(135deg, #6c5ce7, #8b5cf6);
      color: white;
    }
    .btn-disconnect {
      background: rgba(255,82,82,0.15);
      color: #ff5252;
      border: 1px solid rgba(255,82,82,0.2);
    }
    .btn:hover { opacity: 0.85; }
    .info {
      margin-top: 14px;
      font-size: 11px;
      color: #5c5c78;
      line-height: 1.6;
    }
    .info a { color: #a29bfe; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">👻</div>
    <span class="title">Phantom Agent</span>
  </div>

  <div class="status disconnected" id="status">
    <div class="dot"></div>
    <span id="statusText">Déconnecté</span>
  </div>

  <button class="btn btn-connect" id="actionBtn">
    🔌 Connecter
  </button>

  <div class="info">
    Serveur : <a href="http://localhost:3001" target="_blank">localhost:3001</a><br>
    Lancez le serveur Phantom Agent puis cliquez sur Connecter.
  </div>

  <script src="popup.js"></script>
</body>
</html>
